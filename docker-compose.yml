version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apiappstudy-backend
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=ApiAppStudyDB;User=root;Password=root1234;
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - apiappstudy-network

  mysql:
    image: mysql:8.0
    container_name: apiappstudy-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=2003
      - MYSQL_DATABASE=db_study
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - apiappstudy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  apiappstudy-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
